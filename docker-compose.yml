services:
  # ── The Aegis App ────────────────────────────────────────────
  app:
    build: .
    container_name: aegis-app
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

  # ── LocalStack (AWS emulator) ────────────────────────────────
  localstack:
    image: localstack/localstack
    container_name: aegis-localstack
    ports:
      - "4566:4566"
    environment:
      - DEBUG=1
      - SERVICES=s3,logs
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack/init:/etc/localstack/init/ready.d
      - ./scripts/localstack/data:/seed-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  localstack_data:
    driver: local
